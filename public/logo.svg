<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Geometric G built from construction elements -->

  <!-- G arc (open circle) -->
  <path d="M 150,70 A 65,65 0 1,0 150,130" fill="none" stroke="#0a7e7a" stroke-width="24" stroke-linecap="round"/>

  <!-- Horizontal bar of the G -->
  <line x1="100" y1="130" x2="150" y2="130" stroke="#0a7e7a" stroke-width="24" stroke-linecap="round"/>

  <!-- Right-angle marker at junction -->
  <rect x="130" y="110" width="18" height="18" fill="none" stroke="#0ea5a0" stroke-width="3.5"/>
</svg>
